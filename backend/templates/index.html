<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Checker</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
    }
    h1 {
    color: #2c3e50;
    }

    input[type="file"], textarea {
        width: 100%;
        margin: 10px 0;
        padding: 8px;
    }

    input[type="submit"] {
        background-color: #2c3e50;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    #result {
        margin-top: 20px;
        padding: 15px;
        background-color: #f0f0f0;
        border-radius: 5px;
    }
</style>
</head>

<body>
    <h1>ATS Resume Checker</h1>
    <form action="">
        <label for="resume">Upload your resume</label><br>
        <input type="file" id="fname" name="fname" ><br>
        <label for="jd">Upload your job description</label><br>
        <textarea id="job_description" name="job_description" rows="5" cols="50"></textarea>
        <input type="submit" value="Submit">
    </form> 
    <div id="result"></div>
    <button type="button" onclick="window.location.href='/history'">View History</button>

    <script>
    document.querySelector('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.querySelector('input[type="submit"]');
        btn.value = "Checking...";
        btn.disabled = true;
        const formData = new FormData();
        formData.append('file', document.querySelector('input[type="file"]').files[0]);
        formData.append('job_description', document.querySelector('textarea').value);
        
        const response = await fetch('http://127.0.0.1:5000/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        if (data.error) {
            document.getElementById('result').innerHTML = `<p style="color:red;">${data.error}</p>`;
            return;
        }
        console.log(data);
        const color = data.Score >= 80 ? 'green' : data.Score >= 50 ? 'orange' : 'red';
        btn.value = "Submit";
        btn.disabled = false;
        document.getElementById('result').innerHTML = `
            <h2 style="color:${color}">Score: ${data.Score.toFixed(2)}%</h2>
            <p>Matched: ${data.KeyWord_exists.join(', ')}</p>
            <p>Missing: ${data.KeyWord_not_exist.join(', ')}</p>
        `;
    });
    </script>
</body>
</html>
